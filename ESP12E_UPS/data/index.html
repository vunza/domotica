<!DOCTYPE HTML>
<html>

<head>
  <!--<title>Painel de Controlo UPS</title>-->
  <tibtn_tmrse></tibtn_tmrse>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" type="text/css" href="style.css" />
</head>

<body>

  <div class="topnav">
    <h2>Painel de Controlo UPS</h2>
  </div>

  <div class="content">

    <div class="cards">

      <div class="card">
        <p>
        <div id="div_tensao" class="tensao"></div> Tensão</p>
        <p><span class="reading"><span id="volt"></span> V</span></p>
      </div>

      <div class="card">
        <p>
        <div id="div_temperatura" class="temperatura"></div> Temperatura</p>
        <p><span class="reading"><span id="temp"></span> &deg;C</span></p>
      </div>

      <div class="card">
        <p>
        <div id="div_humidade" class="humidade"></div> Humidade</p>
        <p><span class="reading"><span id="hum"></span> &percnt;</span></p>
      </div>

      <div class="card">
        <p>
        <div id="div_pressao" class="pressao"></div> Pressão</p>
        <p><span class="reading"><span id="pres"></span> hPa</span></p>
      </div>

    </div>

  </div>

  <script type="text/javascript" src="script.js"></script>

</body>

</html>
